; PlatformIO project configuration — fixture for test_platformio_importer.py
; Arduino Uno project with 2 libraries.

[platformio]
default_envs = uno_blink

[env:uno_blink]
platform   = atmelavr
board      = uno
framework  = arduino

lib_deps =
    ArduinoJson@6.21.3
    Adafruit DHT sensor library @ 1.4.4

build_flags =
    -DDEBUG=1
    -DLED_PIN=13

monitor_speed = 115200
