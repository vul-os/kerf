[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-worker"
version = "0.1.0"
description = "kerf-worker — BYO GPU worker companion CLI for Kerf"
readme = "README.md"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "typer>=0.12",
    "pydantic>=2.0",
]

[project.scripts]
kerf-worker = "kerf_worker.cli:main"

[project.urls]
Homepage = "https://kerf.sh"
Repository = "https://github.com/kerf-sh/kerf"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_worker"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--import-mode=importlib"
