[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-cli"
version = "0.1.0"
description = "Kerf CLI — thin client (kerf login) + self-host entrypoint (kerf serve)"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]

# Thin-client deps only — no server stack required for `pip install kerf-cli`
dependencies = []

[project.optional-dependencies]
# [server] pulls the runtime stack required by `kerf serve` — WITHOUT
# DMTAP-PUB. kerf-core discovers plugins purely via the "kerf.plugins"
# entry-point group (see kerf_core.app._discover_entry_points); it never
# imports kerf_pub directly, so the server starts and runs fine with the
# publish-to-Workshop feature simply absent (no /api/pub/* routes mounted).
# Keep in sync with root pyproject.toml [server] extra.
server = [
    "kerf-core>=0.1.0",
    "kerf-api>=0.1.0",
    "kerf-auth>=0.1.0",
    "kerf-cloud>=0.1.0",
    "asyncpg>=0.29.0",
    "uvicorn[standard]>=0.29.0",
]
# [pub] adds the DMTAP-PUB "publish to the decentralized Workshop" feature
# (§22) on top of [server]. It is an add-on, not a requirement: install
# `kerf-cli[server,pub]` (or `kerf[server,pub]` from the root package) to get
# it. kerf-pub registers itself under the "kerf.plugins" entry-point group,
# so kerf-core picks it up automatically once installed — no other wiring
# needed.
pub = [
    "kerf-pub>=0.1.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.scripts]
kerf = "kerf_cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_cli"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
