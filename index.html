<!doctype html>
<html lang="en">
  <head>
    <!-- Charset + viewport (must come first) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!--
      Content-Security-Policy
      ─────────────────────────────────────────────────────────────────────────
      default-src 'self'          — safe baseline; unlisted fetch types fall here
      script-src  'self'
                  'unsafe-inline' — JSON-LD <script type="application/ld+json">
                                    blocks in this file + Vite dev HMR injection
                  'unsafe-eval'   — opencascade.js / planegcs emscripten glue
                                    calls eval() internally; WASM JIT also
                                    requires this in some browsers without the
                                    more targeted 'wasm-unsafe-eval' (Chrome 95+
                                    accepts the narrower form; we keep the broader
                                    one for Safari/Firefox compat)
      style-src   'self'
                  'unsafe-inline' — Tailwind utility classes are injected as
                                    inline <style> tags by the Vite Tailwind
                                    plugin; component-level inline style={} props
                                    also require this
      img-src     'self' data: blob:
                                  — data: for SVG/favicon inlining; blob: for
                                    Three.js screenshot canvases and file-object
                                    preview URLs
      font-src    'self' data:    — self-hosted fonts; data: for inline font
                                    faces if any are injected by hljs themes
      connect-src 'self'          — all XHR/fetch goes to same origin (/api, /auth)
      worker-src  blob: 'self'    — Web Workers are constructed from blob: URLs
                                    by Vite's worker bundling and by the OCCT /
                                    tscircuit / sketchSolver workers
      child-src   blob:           — same blob: allowance for nested workers
      object-src  'none'          — block <object>/<embed>; nothing uses these
      base-uri    'self'          — prevent <base> tag injection attacks
      form-action 'self'          — lock form submissions to same origin
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src  'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
      style-src   'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      img-src     'self' data: blob: https://*.r2.dev https://*.kerf.sh https://lh3.googleusercontent.com https://*.googleusercontent.com https://avatars.githubusercontent.com;
      font-src    'self' data: https://cdn.jsdelivr.net;
      connect-src 'self' https://cdn.jsdelivr.net https://*.r2.dev https://*.kerf.sh;
      worker-src  blob: 'self' https://cdn.jsdelivr.net;
      child-src   blob:;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    " />

    <!-- Primary identity -->
    <title>Kerf — Chat-Driven CAD for Every Discipline</title>
    <meta name="description" content="Kerf is a chat-native CAD workspace: write JSCAD, draft B-rep features, sketch with constraints, lay out PCBs, and ship real engineering drawings — with an LLM editing the source for you. MIT-licensed, runs locally or hosted." />
    <meta name="keywords" content="CAD, JSCAD, OpenCascade, parametric design, B-rep, PCB design, tscircuit, electronic CAD, mechanical CAD, jewelry CAD, architecture CAD, chat AI, LLM CAD, open source CAD, browser CAD" />
    <meta name="author" content="Kerf" />
    <meta name="theme-color" content="#FFD633" />
    <meta name="color-scheme" content="dark" />
    <link rel="canonical" href="https://kerf.sh/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kerf" />
    <meta property="og:title" content="Kerf — Chat-Driven CAD for Every Discipline" />
    <meta property="og:description" content="A chat-native CAD workspace. JSCAD + B-rep + sketcher + PCBs + drawings. MIT-licensed; runs locally or hosted." />
    <meta property="og:url" content="https://kerf.sh/" />
    <meta property="og:image" content="https://kerf.sh/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kerf chat-driven CAD workspace" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kerf_sh" />
    <meta name="twitter:title" content="Kerf — Chat-Driven CAD for Every Discipline" />
    <meta name="twitter:description" content="A chat-native CAD workspace. JSCAD + B-rep + sketcher + PCBs + drawings. MIT-licensed, runs locally or hosted." />
    <meta name="twitter:image" content="https://kerf.sh/twitter-card.png" />
    <meta name="twitter:image:alt" content="Kerf chat-driven CAD workspace" />

    <!-- Robots / discovery -->
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kerf",
      "url": "https://kerf.sh/",
      "logo": "https://kerf.sh/favicon.svg",
      "description": "Makers of Kerf — a chat-native CAD workspace for mechanical, electronics, jewelry, and architecture design.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Durban, South Africa"
      },
      "sameAs": [
        "https://github.com/kerf-sh/kerf"
      ]
    }
    </script>
    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kerf",
      "url": "https://kerf.sh/",
      "description": "Chat-native CAD workspace: JSCAD, B-rep features, parametric sketcher, PCB layout, and engineering drawings — with an LLM editing the source. MIT-licensed.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://kerf.sh/docs?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Kerf",
      "description": "A chat-driven CAD workspace combining JSCAD code, OpenCascade B-rep features, planegcs sketcher, tscircuit electronics, and TechDraw drawings — with an LLM editing source files.",
      "url": "https://kerf.sh/",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Browser, macOS, Linux, Windows",
      "license": "https://opensource.org/licenses/MIT",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <style>
      html, body { background: #0a0a0a; color: #facc15; }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        z-index: 0;
      }
      .kerf-boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        z-index: 9999;
        color: #facc15;
      }
      .kerf-boot__svg { width: 96px; height: 96px; color: #facc15; }
      .kerf-boot__svg polygon {
        fill: none;
        stroke: currentColor;
        stroke-width: 4;
        stroke-linejoin: round;
        animation: kerf-boot-pulse 1.2s ease-in-out infinite;
      }
      .kerf-boot__svg polygon:nth-child(2) { animation-delay: 0.4s; }
      .kerf-boot__svg polygon:nth-child(3) { animation-delay: 0.8s; }
      @keyframes kerf-boot-pulse {
        0%, 100% { fill-opacity: 0; stroke-opacity: 0.35; }
        50%      { fill-opacity: 0.25; stroke-opacity: 1; }
      }
      .kerf-boot__label {
        margin-top: 1.25rem;
        font: 500 0.875rem/1.25rem ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        letter-spacing: 0.02em;
        opacity: 0.7;
      }
      .kerf-boot__inner { display: flex; flex-direction: column; align-items: center; }
      @media (prefers-reduced-motion: reduce) {
        .kerf-boot__svg polygon { animation: none; fill-opacity: 0.2; stroke-opacity: 1; }
      }
    </style>
    <div id="root">
      <div class="kerf-boot" role="status" aria-live="polite" aria-label="Loading Kerf">
        <div class="kerf-boot__inner">
          <svg class="kerf-boot__svg" viewBox="0 0 100 100" aria-hidden="true">
            <polygon points="50,10 90,80 10,80" />
            <polygon points="30,80 70,80 50,46" />
            <polygon points="50,46 70,80 30,80" />
          </svg>
          <div class="kerf-boot__label">Loading Kerf…</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
