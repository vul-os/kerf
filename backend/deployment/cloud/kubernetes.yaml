# Build the image from the monorepo root:
#   docker build --build-arg KERF_PERSONA=api-only \
#     -t gcr.io/PROJECT/kerf-api:latest .
# For compute pods: KERF_PERSONA=compute-only
# Entry point is `kerf-server` (console_script from packages/kerf-core).
apiVersion: v1
kind: Namespace
metadata:
  name: kerf
---
apiVersion: v1
kind: Secret
metadata:
  name: kerf-secrets
  namespace: kerf
type: Opaque
stringData:
  database-url: "postgres://user:pass@host:5432/kerf?sslmode=require"
  jwt-secret: "CHANGE_ME"
  password-pepper: "CHANGE_ME"
  google-client-id: ""
  google-client-secret: ""
  anthropic-api-key: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kerf-api
  namespace: kerf
  labels:
    app: kerf-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kerf-api
  template:
    metadata:
      labels:
        app: kerf-api
    spec:
      containers:
        - name: api
          image: gcr.io/PROJECT/kerf-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENV
              value: "cloud"
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kerf-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kerf-secrets
                  key: jwt-secret
            - name: PASSWORD_PEPPER
              valueFrom:
                secretKeyRef:
                  name: kerf-secrets
                  key: password-pepper
            - name: STORAGE_BACKEND
              value: "s3"
            - name: S3_BUCKET
              value: "kerf-storage"
            - name: S3_REGION
              value: "us-east-1"
            - name: CDN_BASE_URL
              value: ""
            - name: LOCAL_MODE
              value: "false"
            - name: CLOUD_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 30"]
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: kerf-api
  namespace: kerf
spec:
  selector:
    app: kerf-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
