[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-hvac"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "HVAC duct fabrication plugin for Kerf"
requires-python = ">=3.11"
dependencies = []

[project.entry-points."kerf.plugins"]
hvac = "kerf_hvac.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_hvac"]

[tool.pytest.ini_options]
testpaths = ["tests"]
