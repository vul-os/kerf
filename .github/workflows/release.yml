# Kerf release workflow
#
# Triggered by pushing a version tag (v*) — but NOT sdk-v* tags (those
# trigger packages/kerf-sdk/.github/workflows/publish.yml instead).
#
# What this does:
#   1. `docker`    — builds a Docker image for each persona (full, mech,
#                    electronics, bim) using the repo-root Dockerfile and the
#                    KERF_PERSONA build-arg, and pushes to GitHub Container
#                    Registry (ghcr.io/kerf-sh/kerf). :latest and :<version>
#                    point to the "full" persona; :<version>-<persona> are
#                    the persona variants.
#   2. `artifacts` — builds the frontend once and assembles installable
#                    tarballs: kerf-<tag>-macos-arm64.tar.gz,
#                    -macos-x64.tar.gz, -linux-x64.tar.gz (identical
#                    contents — Kerf is Python + Node, not a compiled
#                    binary, so there's nothing to cross-compile per OS yet;
#                    see install.sh's comment and docs/releasing.md for the
#                    single-binary TODO) plus a universal -src.tar.gz
#                    (`git archive` of the tag), and a SHA256SUMS file.
#   3. `publish`   — creates ONE GitHub Release for the tag, using the
#                    matching section of CHANGELOG.md as the release notes,
#                    and attaches every tarball + SHA256SUMS from `artifacts`.
#
# Usage:
#   ./scripts/bump-version.sh 0.2.0   # or: make release VERSION=0.2.0
#   git tag v0.2.0 && git push origin v0.2.0

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'        # matches v0.1.0, v1.2.3, …
      - '!sdk-v*'        # tag-filter exclusion (belt-and-suspenders — the
                          # sdk workflow only fires on sdk-v* anyway)

permissions:
  contents: write      # create GitHub Release + upload assets
  packages: write      # push to ghcr.io

jobs:
  # ── Docker images (GHCR) ─────────────────────────────────────────────────
  docker:
    name: Build, push Docker images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        persona:
          - full
          - mech
          - electronics
          - bim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strip the leading 'v' for Docker tags (v0.1.0 → 0.1.0)
      - name: Derive version string
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME}"          # e.g. v0.1.0
          VERSION="${RAW#v}"                # e.g. 0.1.0
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Persona-specific image ──────────────────────────────────────────
      # Every persona gets a :<version>-<persona> tag.
      # The "full" persona additionally gets :<version> and :latest.
      - name: Build and push (${{ matrix.persona }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            KERF_PERSONA=${{ matrix.persona }}
          tags: |
            ghcr.io/kerf-sh/kerf:${{ steps.ver.outputs.version }}-${{ matrix.persona }}
          cache-from: type=gha,scope=${{ matrix.persona }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.persona }}

      # ── Canonical tags for "full" only ─────────────────────────────────
      - name: Tag full persona as :version and :latest
        if: matrix.persona == 'full'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            KERF_PERSONA=full
          tags: |
            ghcr.io/kerf-sh/kerf:${{ steps.ver.outputs.version }}
            ghcr.io/kerf-sh/kerf:latest
          cache-from: type=gha,scope=full
          cache-to:   type=gha,mode=max,scope=full

  # ── Installable tarballs (frontend + Python source + venv installer) ────
  artifacts:
    name: Build release tarballs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Assemble release bundle + tarballs
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"                 # e.g. v0.1.0
          STAGE="kerf-${TAG}"
          mkdir -p "release/${STAGE}"

          # Pre-built frontend
          cp -r dist "release/${STAGE}/dist"

          # Python plugin packages (source only, no kerf-sdk — it has its
          # own PyPI release cadence via sdk-v* tags) and repo metadata the
          # bundled setup.sh / a self-hoster needs.
          mkdir -p "release/${STAGE}/packages"
          for pkg_dir in packages/kerf-*/; do
            pkg="$(basename "$pkg_dir")"
            [ "$pkg" = "kerf-sdk" ] && continue
            rsync -a \
              --exclude '__pycache__' --exclude '*.pyc' \
              --exclude '.pytest_cache' --exclude '.mypy_cache' \
              --exclude 'node_modules' --exclude '.venv' --exclude 'dist' \
              --exclude '*.egg-info' \
              "$pkg_dir" "release/${STAGE}/packages/${pkg}/"
          done

          cp pyproject.toml kerf.example.toml README.md LICENSE CHANGELOG.md VERSION \
            "release/${STAGE}/"
          cp scripts/bundled-setup.sh "release/${STAGE}/setup.sh"
          chmod +x "release/${STAGE}/setup.sh"

          # Identical contents per OS label — see the header comment in
          # install.sh and the "single-binary TODO" note in docs/releasing.md.
          mkdir -p release-out
          ( cd release && for os in macos-arm64 macos-x64 linux-x64; do
              tar -czf "../release-out/kerf-${TAG}-${os}.tar.gz" "${STAGE}"
            done )

          # Universal source tarball straight from the tagged commit (for
          # anyone who wants the full monorepo, incl. kerf-sdk, tests/, etc.)
          git archive --format=tar.gz --prefix="${STAGE}-src/" -o "release-out/kerf-${TAG}-src.tar.gz" "$TAG"

          ( cd release-out && sha256sum kerf-* > SHA256SUMS && cat SHA256SUMS )

      - name: Upload tarballs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarballs
          path: release-out/*
          retention-days: 1

  # ── Create the GitHub Release ────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, artifacts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          name: release-tarballs
          path: release-out

      # Pull the "## [X.Y.Z] - ..." section out of CHANGELOG.md (strict
      # Keep a Changelog headers) and use it verbatim as the release body.
      - name: Extract CHANGELOG section for this version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found && /^\[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md

          if [ ! -s notes.md ]; then
            echo "::warning::No CHANGELOG.md section found for ${VERSION} — falling back to a minimal note."
            {
              echo "## [${VERSION}]"
              echo ""
              echo "See [CHANGELOG.md](https://github.com/vul-os/kerf/blob/main/CHANGELOG.md)."
            } > notes.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## Container images"
            echo ""
            echo '```'
            echo "docker pull ghcr.io/kerf-sh/kerf:${VERSION}"
            echo '```'
            echo ""
            echo "| Tag | Persona |"
            echo "|-----|---------|"
            echo "| \`ghcr.io/kerf-sh/kerf:${VERSION}\` | full (everything) |"
            echo "| \`ghcr.io/kerf-sh/kerf:${VERSION}-mech\` | mechanical CAD stack |"
            echo "| \`ghcr.io/kerf-sh/kerf:${VERSION}-electronics\` | EDA / PCB stack |"
            echo "| \`ghcr.io/kerf-sh/kerf:${VERSION}-bim\` | BIM stack |"
            echo ""
            echo "## Install script"
            echo ""
            echo '```'
            echo "curl -fsSL https://kerf.sh/install.sh | sh"
            echo '```'
          } >> notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: notes.md
          files: |
            release-out/kerf-*
            release-out/SHA256SUMS
