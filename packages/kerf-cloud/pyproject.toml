[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-cloud"
version = "0.1.0"
description = "Kerf cloud plugin: git, GitHub OAuth, workshop (cloud-only)"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.111.0",
    "asyncpg>=0.29.0",
    "httpx>=0.27.0",
    "aiohttp>=3.9.0",
    "cryptography>=42.0.0",
    "kerf-core>=0.1.0",
    "kerf-auth>=0.1.0",
    "kerf-api>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[project.entry-points."kerf.plugins"]
kerf-cloud = "kerf_cloud.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_cloud"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
