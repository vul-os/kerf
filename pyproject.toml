[tool.hatch.build.targets.wheel]
# Root is a deps-only meta-package (real code lives in packages/*); ship an
# empty wheel. Newer hatchling rejects `packages = []`; bypass-selection is
# the documented way to allow a sourceless project.
bypass-selection = true

