[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-energy"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Energy / daylight / acoustic analysis plugin for Kerf"
requires-python = ">=3.11"
dependencies = []

[project.entry-points."kerf.plugins"]
energy = "kerf_energy.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_energy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
