[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-sdk"
version = "0.1.1"
description = "Python SDK for Kerf — talk to a Kerf instance over HTTP/JSON-RPC"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "respx>=0.21",
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://kerf.app"
Repository = "https://github.com/kerf-sh/kerf"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
