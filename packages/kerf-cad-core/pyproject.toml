[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-cad-core"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Shared pythonOCC base layer for Kerf CAD compute plugins"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111",
    # Numerical stack — used throughout geom/, surfacing, FEM bridges, etc.
    # Declared here so every persona that includes kerf-cad-core (mech, full,
    # compute-only) ships with a working numpy/scipy at runtime.
    "numpy>=1.26",
    "scipy>=1.11",
]

[project.optional-dependencies]
occ = [
    "pythonocc-core",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[project.entry-points."kerf.plugins"]
cad-core = "kerf_cad_core.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_cad_core"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
