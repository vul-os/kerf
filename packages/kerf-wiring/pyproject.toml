[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-wiring"
version = "0.1.0"
description = "Wiring / cable-harness diagram plugin for Kerf (.wiring → SVG via WireViz)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "fastapi",
]

[project.optional-dependencies]
# WireViz is GPLv3+. Installing this extra brings a GPL dependency into the
# process.  See README.md for the licensing implications.
wireviz = ["wireviz"]

[project.entry-points."kerf.plugins"]
wiring = "kerf_wiring.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_wiring"]

[tool.pytest.ini_options]
testpaths = ["tests"]
