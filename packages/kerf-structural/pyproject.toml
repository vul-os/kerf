[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-structural"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Structural RC / steel + rebar design plugin for Kerf"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
]

[project.entry-points."kerf.plugins"]
structural = "kerf_structural.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_structural"]
