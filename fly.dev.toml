# fly.io app config — ONE app per env (kerf-dev / kerf-prod).
#
# Each machine runs the engine (frontend + API) AND the worker harness
# together in-process (KERF_INPROCESS_WORKERS), so there is a single
# instance group: scaling the app scales workers too. No separate
# worker app. Starts at 1 machine (min_machines_running) to keep cost
# low and autoscales on HTTP concurrency (auto_start/auto_stop_machines).
#
# Primary: fra (Frankfurt). The global app name "kerf" is taken on
# fly.io, so the production app is "kerf-prod"; the public domain
# kerf.sh is attached via `flyctl certs` and is independent of the
# internal app name. Deploy: `./scripts/deploy-fly.sh` (main).

app = "kerf-prod"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    KERF_PERSONA = "full"

# release_command runs ONCE in a one-off VM before the new app version
# starts taking traffic. Migrations MUST land here, not after `flyctl
# deploy` — otherwise the new machine boots its in-process workers
# (KERF_INPROCESS_WORKERS=true) and they immediately poll fem_jobs /
# sim_jobs / step_tessellation_jobs / model_prices, crashing with
# UndefinedTableError until the post-deploy migration step catches up
# tens of seconds later. The git panel (and any other endpoint that
# reads from a yet-to-be-created table) returns 500 in that window.
[deploy]
  release_command = "python -m kerf_core.db.migrations.runner"

[env]
  KERF_PORT = "8080"
  KERF_FRONTEND_DIST = "/app/dist"
  STORAGE_BACKEND = "s3"
  # Tigris S3-compatible endpoint (set by `flyctl storage create`).
  KERF_STORAGE_S3_ENDPOINT = "https://fly.storage.tigris.dev"
  KERF_STORAGE_S3_REGION = "auto"
  CLOUD_ENABLED = "true"
  # Run the worker harness in-process (engine + workers co-located).
  # To SEPARATE workers later: set this to "false" here (or
  # `flyctl secrets set KERF_INPROCESS_WORKERS=false --app <app>`),
  # then deploy the standalone worker app from fly.worker.toml. No code
  # change — both paths share kerf_workers.runner._build_workers.
  KERF_INPROCESS_WORKERS = "true"
  # Postgres (Neon or fly.io managed) — set DATABASE_URL via secret.

# Secrets to set (via `flyctl secrets set KEY=value`):
#   DATABASE_URL                       Postgres connection string
#   KERF_STORAGE_S3_BUCKET             Tigris bucket name
#   KERF_STORAGE_S3_ACCESS_KEY         Tigris access key
#   KERF_STORAGE_S3_SECRET_KEY         Tigris secret key
#   CLOUD_PAYSTACK_SECRET_KEY          Paystack live key
#   CLOUD_PAYSTACK_PUBLIC_KEY          Paystack public key
#   LLM_ANTHROPIC_API_KEY              Anthropic key (or whichever providers)
#   LLM_OPENAI_API_KEY                 OpenAI key
#   LLM_GOOGLE_API_KEY                 Google key
#   LLM_DEEPSEEK_API_KEY               DeepSeek key
#   LLM_MINIMAX_API_KEY                MiniMax key
#   JWT_SECRET                         Session signing
#   KERF_LOCAL_MODE                    "false" for hosted (default true in code)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "performance-2x"
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2

# Secondary region replicas — uncomment when traffic justifies.
# [[vm]]
#   region = "fra"
#   size = "performance-2x"
