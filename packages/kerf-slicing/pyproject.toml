[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-slicing"
version = "0.1.0"
description = "3D-print G-code slicing plugin for Kerf (.print → G-code via CuraEngine)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "fastapi",
]

[project.optional-dependencies]
# CuraEngine is AGPLv3. Installing this extra makes CuraEngine available
# as a subprocess. See README.md for the licensing implications.
cura = []

[project.entry-points."kerf.plugins"]
slicing = "kerf_slicing.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_slicing"]

[tool.pytest.ini_options]
testpaths = ["tests"]
