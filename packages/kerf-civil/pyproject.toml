[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-civil"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Civil engineering plugin for Kerf — horizontal/vertical alignment, corridor, earthwork"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "asyncpg",
    "aiohttp",
    "numpy>=1.26",
    "scipy>=1.11",
]

[project.entry-points."kerf.plugins"]
civil = "kerf_civil.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_civil"]
