name: Publish kerf-sdk-rs

on:
  push:
    tags:
      - 'sdk-rs-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify crate builds and tests pass
        run: cargo test --manifest-path packages/kerf-sdk-rs/Cargo.toml

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --manifest-path packages/kerf-sdk-rs/Cargo.toml
