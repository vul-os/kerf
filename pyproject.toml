[tool.pytest.ini_options]
# Auto-discover tests from every plugin package and from the legacy backend/
# tree (which still hosts shared tools/ / workers/ / utils/ used by plugins
# until the next migration pass).
testpaths = [
    "packages/kerf-cli/tests",
    "packages/kerf-core/tests",
    "packages/kerf-auth/tests",
    "packages/kerf-api/tests",
    "packages/kerf-chat/tests",
    "packages/kerf-v1/tests",
    "packages/kerf-billing/tests",
    "packages/kerf-cloud/tests",
    "packages/kerf-pricing/tests",
    "packages/kerf-cad-core/tests",
    "packages/kerf-tess/tests",
    "packages/kerf-fem/tests",
    "packages/kerf-cam/tests",
    "packages/kerf-topo/tests",
    "packages/kerf-mates/tests",
    "packages/kerf-bim/tests",
    "packages/kerf-electronics/tests",
    "packages/kerf-imports/tests",
    "packages/kerf-render/tests",
    "packages/kerf-workers/tests",
    "packages/kerf-parts/tests",
    "packages/kerf-partsgen/tests",
    "packages/kerf-worker/tests",
    "packages/kerf-plm/tests",
    "tests/perf",
]
asyncio_mode = "auto"
# importlib mode lets multiple plugin tests/ dirs coexist without conflicting
# package paths.
# Ignore tests for known-broken untracked straggler modules (sysml1d, explicit,
# si_refvalues, tracecurrent_refvalues). They are partial implementations from
# interrupted prior work; the test files remain in the working tree but the
# modules need a focused hardening pass. Drop the corresponding --ignore line
# once each module turns its suite green.
addopts = "--import-mode=importlib"
