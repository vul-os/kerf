[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-plm"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "PLM (Product Lifecycle Management) plugin for Kerf — configurator, effectivity BOM, ECR/ECO"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
]

[project.entry-points."kerf.plugins"]
plm = "kerf_plm.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_plm"]
