[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-costing"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "BIM/AEC material quantity schedules and cost rollup for Kerf"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[project.entry-points."kerf.plugins"]
kerf_costing = "kerf_costing.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_costing"]
