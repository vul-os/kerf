[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ---------------------------------------------------------------------------
# kerf — meta-package that installs a named "persona" bundle of plugins.
#
# Cloud-deploy story
# ------------------
# Each pod type selects the minimal set of plugins it needs:
#
#   api-only      stateless API gateway + chat (no heavy compute)
#   mech          full mechanical CAD stack (CAD, FEM, CAM, topology, mates)
#   electronics   EDA / PCB / SPICE stack
#   bim           building information modelling stack
#   full          everything (monolith / development)
#   compute-only  heavy compute workers only (no auth/API; behind internal LB)
#
# Install example:
#   pip install -e .[mech]
# ---------------------------------------------------------------------------

[project]
name = "kerf"
version = "0.1.0"
description = "Chat-driven CAD/EDA/BIM platform — meta package"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
# kerf-cli is the front-door: `pip install kerf` puts `kerf` on PATH.
dependencies = ["kerf-cli>=0.1.0"]

[project.optional-dependencies]

# `pip install 'kerf[server]'` — self-host install: CLI + full runtime stack.
# Delegates to kerf-cli[server] so the dep list is defined in one place.
server = [
    "kerf-cli[server]>=0.1.0",
]

api-only = [
    "kerf-core",
    "kerf-auth",
    "kerf-api",
    "kerf-chat",
    "kerf-v1",
    "kerf-pub",
]

