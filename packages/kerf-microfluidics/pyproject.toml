[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-microfluidics"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Microfluidics and MEMS design plugin for Kerf"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
]

[project.entry-points."kerf.plugins"]
microfluidics = "kerf_microfluidics.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_microfluidics"]
