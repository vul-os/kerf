[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-pub"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "DMTAP-PUB public-object substrate for Kerf's decentralized Workshop"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111",
    "cryptography>=42.0.0",
    "asyncpg>=0.29",
    "kerf-core",
    # DMTAP-PUB v0 addresses content under BLAKE3-256 (§18.1.5, prefix 0x1e).
    # This is the fast path only: kerf_pub.blake3_pure is a byte-identical
    # dependency-free implementation that takes over if the wheel is missing,
    # so a platform without a prebuilt binary loses speed, never interop.
    "blake3>=0.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[project.entry-points."kerf.plugins"]
pub = "kerf_pub.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_pub"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
