<!doctype html>
<html lang="en">
  <head>
    <!-- Charset + viewport (must come first) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary identity -->
    <title>Kerf — chat-driven CAD</title>
    <meta name="description" content="Kerf is a chat-native CAD workspace: write JSCAD, draft B-rep features, sketch with constraints, lay out PCBs, and ship real engineering drawings — with an LLM editing the source for you. MIT-licensed, runs locally or hosted." />
    <meta name="keywords" content="CAD, JSCAD, OpenCascade, parametric design, B-rep, PCB design, tscircuit, electronic CAD, mechanical CAD, chat AI, LLM CAD, open source CAD, browser CAD" />
    <meta name="author" content="Kerf" />
    <meta name="theme-color" content="#FFD633" />
    <meta name="color-scheme" content="dark" />
    <!-- TODO: update if deploying to a different domain than kerf.app -->
    <link rel="canonical" href="https://kerf.app/" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kerf" />
    <meta property="og:title" content="Kerf — chat-driven CAD" />
    <meta property="og:description" content="A chat-native CAD workspace. JSCAD + B-rep + sketcher + PCBs + drawings. MIT-licensed; runs locally or hosted. Built in Durban." />
    <meta property="og:url" content="https://kerf.app/" />
    <meta property="og:image" content="https://kerf.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kerf — chat-driven CAD" />
    <meta property="og:locale" content="en_ZA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kerf — chat-driven CAD" />
    <meta name="twitter:description" content="A chat-native CAD workspace. JSCAD + B-rep + sketcher + PCBs + drawings. MIT-licensed." />
    <meta name="twitter:image" content="https://kerf.app/twitter-card.png" />
    <meta name="twitter:image:alt" content="Kerf — chat-driven CAD" />

    <!-- Robots / discovery -->
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- JSON-LD structured data for rich Google results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Kerf",
      "description": "A chat-driven CAD workspace combining JSCAD code, OpenCascade B-rep features, planegcs sketcher, tscircuit electronics, and TechDraw drawings — with an LLM editing source files.",
      "url": "https://kerf.app/",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Browser, macOS, Linux, Windows",
      "license": "https://opensource.org/licenses/MIT",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
