[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-interior"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "Interior / space-planning / FF&E plugin for Kerf"
requires-python = ">=3.11"
dependencies = []

[project.entry-points."kerf.plugins"]
interior = "kerf_interior.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_interior"]

[tool.pytest.ini_options]
testpaths = ["tests"]
