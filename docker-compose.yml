version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Override persona for local dev — 'full' installs every plugin.
      # For lighter images use: mech | electronics | bim | api-only | compute-only
      args:
        KERF_PERSONA: ${KERF_PERSONA:-full}
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - ENV=${ENV:-local}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/kerf}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - PASSWORD_PEPPER=${PASSWORD_PEPPER:-dev-pepper}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - CDN_BASE_URL=${CDN_BASE_URL:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-20250514}
      - LOCAL_MODE=${LOCAL_MODE:-true}
      - CLOUD_ENABLED=${CLOUD_ENABLED:-false}
    volumes:
      - storage-data:/data/storage
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    stop_grace_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kerf
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  storage-data:
  postgres-data:
  redis-data:
