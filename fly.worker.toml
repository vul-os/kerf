# fly.io worker app config — OPTIONAL (separation path).
#
# By default workers run in-process inside the engine app (see fly.toml
# KERF_INPROCESS_WORKERS=true): one instance group, scales together.
#
# To split workers onto their own machines later (no code change):
#   1. flyctl secrets set KERF_INPROCESS_WORKERS=false --app <engine app>
#      (e.g. kerf-prod / kerf-dev) and redeploy it — engine now HTTP-only.
#   2. flyctl apps create kerf-workers   # or kerf-dev-workers
#   3. flyctl deploy --config fly.worker.toml --app kerf-workers
#      (deploy-fly.sh auto-includes it once the app exists).
# Same image as the root Dockerfile; this runs kerf_workers.runner,
# which shares _build_workers() with the in-process path — no drift.
# No public HTTP service; fly manages lifecycle via internal probes.

app = "kerf-workers"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    KERF_PERSONA = "compute-only"

[env]
  KERF_PORT = "8080"
  STORAGE_BACKEND = "s3"
  # R2 endpoint is account-specific — set via the shared KERF_STORAGE_S3_ENDPOINT
  # secret (https://<ACCOUNT_ID>.r2.cloudflarestorage.com), not hardcoded.
  KERF_STORAGE_S3_REGION = "auto"
  CLOUD_ENABLED = "true"
  KERF_WORKERS_ONLY = "true"   # picks the worker entry-point at boot

# Secrets are shared with the main app — set via:
#   flyctl secrets set --app kerf-workers DATABASE_URL=... etc.

[processes]
  worker = "python -m kerf_workers.runner"

[[vm]]
  size = "performance-2x"
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2
  processes = ["worker"]
