[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-api"
version = "0.1.0"
description = "Kerf API plugin: REST surface for files, projects, workspaces"
requires-python = ">=3.11"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
dependencies = [
    "fastapi>=0.111.0",
    "asyncpg>=0.29.0",
    "httpx>=0.27.0",
    "pyjwt>=2.8.0",
    "kerf-core>=0.1.0",
    "kerf-auth>=0.1.0",
    # routes_aero_airfoil.py imports numpy directly; declared so the kerf-api
    # plugin can register on every persona regardless of which compute
    # plugins (kerf-cad-core etc.) are also installed.
    "numpy>=1.26",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
]

[project.entry-points."kerf.plugins"]
kerf-api = "kerf_api.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_api"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
