[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kerf-gdnt"
version = "0.1.0"
license = { text = "MIT" }
classifiers = ["License :: OSI Approved :: MIT License"]
description = "GD&T / PMI model-based definition and homologation documentation for Kerf"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
]

[project.entry-points."kerf.plugins"]
gdnt = "kerf_gdnt.plugin:register"

[tool.hatch.build.targets.wheel]
packages = ["src/kerf_gdnt"]
